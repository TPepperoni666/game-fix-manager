; Version 2.0 - (c) 2021-2024 Vaana

[fixes]

; Removes the default 30 FPS frame rate cap and 
; allows for a variable frame rate. Also includes
; fixes for problems related to high FPS.
;
; IF YOU CANNOT PROGRESS DUE TO AN FPS BUG, DISABLE THIS OPTION!
;
; 1 = enabled (default)
; 0 = disabled
fps_unlock=1

; Removes resolution filtering, allowing for non-standard
; resolutions to be selected in the options menu.
; Also allows any resolution to be selected using the
; command-line argument "-res W H"
;
; 1 = enabled (default)
; 0 = disabled
resolution_unlock=1

; Removes black bars on non-16:9 resolutions, rescales the
; GUI to match the screen and corrects the FoV according
; to the current aspect ratio.
;
; 1 = enabled (default)
; 0 = disabled
aspect_correction=1

[options]

; Allows to set a custom frame rate limit.
; Useful for a fluctuating frame rate.
; Only works if fps_unlock is also enabled!
;
; 0 = disabled (default)
; example: fps_limit=30
fps_limit=0

; Allows to set a custom field of view of multiplier.
; Useful if the game appears too zoomed in/out.
; Only works if aspect_correction is also enabled!
;
; 1.0 = default
; example: fov_multiplier=1.5
fov_multiplier=1.0

; Starts the game in a borderless window.
; Allows for faster switching between windows.
; Only works if the "Fullscreen" option is set to
; "NO" in the settings.ini file.
;
; NOTE: If you are using the Rockstar Launcher version,
; you have to disable Fullscreen in the launcher.
; Settings > My Installed Games > L.A. Noire > Fullscreen
;
; 1 = enabled (default)
; 0 = disabled
borderless_window=1

; Skips the company logos and legal information which
; appears when launching the game.
;
; 1 = enabled
; 0 = disabled (default)
skip_logos_and_legals=0


; The force_resolution option is no longer supported.
; Use the command-line argument "-res W H" instead.
; example: LaNoire.exe -res 1280 720
