// Game Fix Manager — Medal of Honor: Allied Assault widescreen for the
// Steam Deck (1280x800, 16:10). idTech3 executes autoexec.cfg at every
// startup, so this re-applies each launch — no need to make the config
// read-only the way a one-time edit of unnamedsoldier.cfg would.
// Adjust cg_fov to taste: ~100 suits 16:10; try 106-115 on a 16:9 screen.
seta r_mode "-1"
seta r_customwidth "1280"
seta r_customheight "800"
seta r_fullscreen "1"
seta cg_fov "100"
